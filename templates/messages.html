<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Contact Messages – Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0A0F1E; color: #F8FAFC; padding: 2rem; }
    h1 { color: #A78BFA; margin-bottom: 1.5rem; }
    .badge { background: #6366F1; color: #fff; border-radius: 999px; padding: 2px 10px; font-size: 0.8rem; margin-left: 0.5rem; }
    table { width: 100%; border-collapse: collapse; background: #111827; border-radius: 12px; overflow: hidden; }
    th { background: #1E1B4B; color: #A78BFA; padding: 0.85rem 1rem; text-align: left; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.85rem 1rem; border-bottom: 1px solid #1f2937; font-size: 0.9rem; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a1f30; }
    .no-msg { text-align: center; padding: 3rem; color: #6b7280; }
    a.back { display: inline-block; margin-bottom: 1.5rem; color: #6366F1; text-decoration: none; font-size: 0.9rem; }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a href="/" class="back">← Back to Portfolio</a>
  <h1>Contact Messages <span class="badge">{{ messages|length }}</span></h1>
  {% if messages %}
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Email</th>
        <th>Subject</th>
        <th>Message</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
      {% for msg in messages %}
      <tr>
        <td>{{ msg.id }}</td>
        <td>{{ msg.name }}</td>
        <td>{{ msg.email }}</td>
        <td>{{ msg.subject }}</td>
        <td>{{ msg.message }}</td>
        <td>{{ msg['submitted_at'] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <div class="no-msg">No messages yet.</div>
  {% endif %}
</body>
</html>
